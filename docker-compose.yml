networks:
  skillfind-network:
    driver: bridge

volumes:
  postgres-data:
  elasticsearch-data:
  rabbitmq-data:

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: skillfind-postgres
    environment:
      POSTGRES_USER: skillfind_user
      POSTGRES_PASSWORD: skillfind_pass
      POSTGRES_DB: skillfind_jobposting
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - skillfind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillfind_user -d skillfind_jobposting"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: skillfind-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: skillfind_user
      RABBITMQ_DEFAULT_PASS: skillfind_pass
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - skillfind-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.21
    container_name: skillfind-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - skillfind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.21
    container_name: skillfind-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - skillfind-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ─── Application Services ─────────────────────────────────────────────────────

  jobposting-api:
    build:
      context: .
      dockerfile: src/Services/JobPosting/JobPosting.API/Dockerfile
    container_name: skillfind-jobposting
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=skillfind_jobposting;Username=skillfind_user;Password=skillfind_pass"
      Elasticsearch__Uri: http://elasticsearch:9200
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: skillfind_user
      RabbitMQ__Password: skillfind_pass
      Auth__Authority: http://jobseeker-api:8080
    ports:
      - "5001:8080"
    networks:
      - skillfind-network
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  jobcategory-api:
    build:
      context: .
      dockerfile: src/Services/JobCategory/JobCategory.API/Dockerfile
    container_name: skillfind-jobcategory
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=skillfind_jobcategory;Username=skillfind_user;Password=skillfind_pass"
      Elasticsearch__Uri: http://elasticsearch:9200
    ports:
      - "5002:8080"
    networks:
      - skillfind-network
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  jobseeker-api:
    build:
      context: .
      dockerfile: src/Services/JobSeeker/JobSeeker.API/Dockerfile
    container_name: skillfind-jobseeker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=skillfind_jobseeker;Username=skillfind_user;Password=skillfind_pass"
      Elasticsearch__Uri: http://elasticsearch:9200
    ports:
      - "5003:8080"
    networks:
      - skillfind-network
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: src/Services/Notification/Notification.Service/Dockerfile
    container_name: skillfind-notification
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: skillfind_user
      RabbitMQ__Password: skillfind_pass
      Elasticsearch__Uri: http://elasticsearch:9200
    networks:
      - skillfind-network
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  search-service:
    build:
      context: .
      dockerfile: src/Services/Search/Search.Service/Dockerfile
    container_name: skillfind-search
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Elasticsearch__Uri: http://elasticsearch:9200
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: skillfind_user
      RabbitMQ__Password: skillfind_pass
    ports:
      - "5004:8080"
    networks:
      - skillfind-network
    restart: on-failure
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  apigateway:
    build:
      context: .
      dockerfile: src/Services/ApiGateway/Dockerfile
    container_name: skillfind-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Elasticsearch__Uri: http://elasticsearch:9200
    ports:
      - "5000:8080"
    networks:
      - skillfind-network
    restart: on-failure
    depends_on:
      - jobposting-api
      - jobcategory-api
      - jobseeker-api
      - search-service
