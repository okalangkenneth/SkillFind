apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobcategory-api
  namespace: skillfind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobcategory-api
  template:
    metadata:
      labels:
        app: jobcategory-api
    spec:
      containers:
      - name: jobcategory-api
        image: skillfind-jobcategory-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jobcategory-connection
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
