# Continuous Integration
# Runs on every push and PR to main.
# Builds all 13 projects and runs tests.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/af-microservices.sln

      - name: Build solution
        run: dotnet build src/af-microservices.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test src/af-microservices.sln --no-build --configuration Release --verbosity normal
        # No test projects exist yet — this exits 0 (no tests = pass).
        # Add test projects in a future phase.
        continue-on-error: true
