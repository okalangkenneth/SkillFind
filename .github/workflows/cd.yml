# Continuous Delivery
# Triggers on push to main after CI passes.
# Builds and pushes all 6 Docker images to GHCR.
# Tags with git SHA (immutable, traceable) and latest (convenience).

name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/okalangkenneth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push JobPosting API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/JobPosting/JobPosting.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skillfind-jobposting-api:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/skillfind-jobposting-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push JobCategory API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/JobCategory/JobCategory.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skillfind-jobcategory-api:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/skillfind-jobcategory-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push JobSeeker API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/JobSeeker/JobSeeker.API/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skillfind-jobseeker-api:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/skillfind-jobseeker-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/Notification/Notification.Service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skillfind-notification-service:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/skillfind-notification-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Search Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/Search/Search.Service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skillfind-search-service:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/skillfind-search-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Services/ApiGateway/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/skillfind-apigateway:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/skillfind-apigateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## Images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| jobposting-api | ${{ steps.tag.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| jobcategory-api | ${{ steps.tag.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| jobseeker-api | ${{ steps.tag.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| notification-service | ${{ steps.tag.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| search-service | ${{ steps.tag.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| apigateway | ${{ steps.tag.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
